name: Docker

on:
  # Trigger on pushes to main that touch source/build files
  push:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "Dockerfile"
      - ".github/workflows/docker.yml"

  # Manual trigger with optional version override
  workflow_dispatch:
    inputs:
      duckdb_version:
        description: "DuckDB version (e.g. v1.5.0). Leave empty for Dockerfile default."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ github.event.inputs.duckdb_version && format('DUCKDB_VERSION={0}', github.event.inputs.duckdb_version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
